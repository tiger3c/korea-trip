const dayColors = {1:'#ff6a88', 2:'#ff8a65', 3:'#66bb6a', 4:'#ab7df0'};

let currentDay = 1;
let currentIdx = 0;
let markers = {};
let polyline = null;

const map = L.map('map', {zoomControl: true}).setView([37.55, 126.99], 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19, attribution: '© OSM'
}).addTo(map);

function renderDay(day) {
  currentDay = day;
  currentIdx = 0;

  document.querySelectorAll('.day-tab').forEach(t => {
    t.classList.toggle('active', parseInt(t.dataset.day) === day);
  });

  // 全コースリンク更新
  document.getElementById('fullCourseLink').href = dayFullCourseLinks[day];

  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};
  if (polyline) { map.removeLayer(polyline); polyline = null; }

  const data = days[day];
  const latlngs = data.items.map(p => [p.lat, p.lng]);

  polyline = L.polyline(latlngs, {
    color: dayColors[day], weight: 3, opacity: 0.6, dashArray: '8, 6'
  }).addTo(map);

  data.items.forEach((item, idx) => {
    const markerClass = item.isHotel ? `number-marker hotel-marker-style` : `number-marker m-d${day}`;
    const markerContent = item.isHotel ? '🏨' : item.num;
    const icon = L.divIcon({
      className: '',
      html: `<div class="${markerClass}">${markerContent}</div>`,
      iconSize: [32, 32], iconAnchor: [16, 16]
    });
    const marker = L.marker([item.lat, item.lng], {icon}).addTo(map);
    marker.bindPopup(`
      <div>
        <div class="popup-badge" style="background:${dayColors[day]}">DAY ${day} · #${item.num}</div>
        <div class="popup-title">${item.name}</div>
        <div class="popup-ko">${item.ko}</div>
        <a href="${getNaverLink(item)}" target="_blank" rel="noopener" class="popup-naver">📍 NAVERマップで開く</a>
      </div>
    `);
    marker.on('click', () => focusItem(idx));
    markers[idx] = marker;
  });

  renderPanel(day);

  const group = L.featureGroup(Object.values(markers));
  map.fitBounds(group.getBounds().pad(0.15));

  setTimeout(() => focusItem(0), 300);
}

function renderPanel(day) {
  const data = days[day];
  const panel = document.getElementById('panel');

  // DAY 4 専用ガイド (都心空港ターミナル) - day-summary 뒤에 표시
  const day4Guide = day === 4 ? `
    <div class="guide-section" id="terminalGuide">
      <div class="guide-header" onclick="document.getElementById('terminalGuide').classList.toggle('collapsed')">
        <span>📋 ソウル駅 都心空港ターミナル 詳細ガイド</span>
      </div>
      <div class="guide-body">
        <div class="guide-block">
          <h4>✈️ 基本情報</h4>
          <ul>
            <li>場所: ソウル駅 地下2F (AREX連結通路)</li>
            <li>営業: 5:20 〜 19:00</li>
            <li>対応航空会社: 大韓航空(KE)、アシアナ(OZ)、チェジュ航空など</li>
            <li class="warn">大韓航空T2出発の<strong>3時間20分前</strong>まで受付!</li>
          </ul>
        </div>

        <div class="guide-block">
          <h4>🎫 持ち物リスト (必須)</h4>
          <ul>
            <li>パスポート (本人確認)</li>
            <li>Eチケット (大韓航空アプリ表示OK)</li>
            <li>クレジットカード (追加料金時)</li>
          </ul>
        </div>

        <div class="guide-block">
          <h4>🧳 荷物注意</h4>
          <ul>
            <li>1人最大32kg・158cm以下</li>
            <li class="warn">リチウム電池/モバイルバッテリーは<strong>機内持込</strong>に</li>
            <li class="warn">ライター・スプレー類も機内持込NG</li>
            <li class="tip">飲みかけのペットボトルは捨てて再購入</li>
          </ul>
        </div>

        <div class="guide-merit">
          <strong>🛂 最大のメリット:</strong><br>
          都心空港でチェックインすると、仁川空港T2の<strong>3階出国場で「Express Departure」専用通路</strong>が使えるよ!通常30分かかる出国審査が<strong>5分</strong>で終わる⚡<br>
          (チェックイン時に専用シールがパスポートに貼られます)
        </div>
      </div>
    </div>
  ` : '';

  let html = `
    <div class="day-summary">
      <div class="day-label">${data.label}</div>
      <h2>${data.title}</h2>
      <p>${data.desc}</p>
      <a href="${dayFullCourseLinks[day]}" target="_blank" rel="noopener" class="day-naver-btn">
        🗺️ この日の全コースをNAVERマップで開く
      </a>
    </div>
    ${day4Guide}
  `;

  let lastCat = '';
  data.items.forEach((item, idx) => {
    if (item.cat !== lastCat) {
      html += `<div class="time-category">${item.cat}</div>`;
      lastCat = item.cat;
    }

    const ratingHtml = item.rating ?
      `<div class="card-rating">★ ${item.rating} <span style="color:#999">(${item.reviews?.toLocaleString() || ''})</span> <span class="dot">·</span> <span class="card-type">${item.type}</span></div>` :
      `<div class="card-type">${item.type}</div>`;

    const cardClass = `card d${day}` + (item.isHotel ? ' hotel-start' : '');
    const cardMarkerContent = item.isHotel ? '🏨' : item.num;
    html += `
      <div class="${cardClass}" data-idx="${idx}" onclick="focusItem(${idx})">
        <div class="card-marker">${cardMarkerContent}</div>
        <div class="card-time">${item.time}</div>
        <div class="card-title">${item.name}</div>
        ${item.ko ? `<div class="card-ko">${item.ko}</div>` : ''}
        ${ratingHtml}
        ${item.memo ? `<div class="card-memo">${item.memo}</div>` : ''}
        <a href="${getNaverLink(item)}" target="_blank" rel="noopener" class="naver-link" onclick="event.stopPropagation()">NAVERマップで開く</a>
      </div>
    `;
  });

  panel.innerHTML = html;
}

function focusItem(idx) {
  currentIdx = idx;
  const data = days[currentDay];
  const item = data.items[idx];

  document.querySelectorAll('.card').forEach((c, i) => {
    c.classList.toggle('active', i === idx);
  });

  Object.entries(markers).forEach(([i, m]) => {
    const el = m.getElement()?.querySelector('.number-marker');
    if (el) el.classList.toggle('active', parseInt(i) === idx);
  });

  map.panTo([item.lat, item.lng], {animate: true, duration: 0.5});
  markers[idx]?.openPopup();

  const card = document.querySelector(`.card[data-idx="${idx}"]`);
  card?.scrollIntoView({behavior: 'smooth', block: 'center'});

  updateNav();
}

function updateNav() {
  const data = days[currentDay];
  document.getElementById('counter').textContent = `${currentIdx + 1} / ${data.items.length}`;
  document.getElementById('prevBtn').disabled = (currentIdx === 0 && currentDay === 1);
  document.getElementById('nextBtn').disabled = (currentIdx === data.items.length - 1 && currentDay === 4);
}

document.getElementById('dayTabs').addEventListener('click', e => {
  if (e.target.dataset.day) renderDay(parseInt(e.target.dataset.day));
});

document.getElementById('nextBtn').addEventListener('click', () => {
  const data = days[currentDay];
  if (currentIdx < data.items.length - 1) {
    focusItem(currentIdx + 1);
  } else if (currentDay < 4) {
    renderDay(currentDay + 1);
  }
});

document.getElementById('prevBtn').addEventListener('click', () => {
  if (currentIdx > 0) {
    focusItem(currentIdx - 1);
  } else if (currentDay > 1) {
    renderDay(currentDay - 1);
    setTimeout(() => focusItem(days[currentDay].items.length - 1), 350);
  }
});

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') document.getElementById('nextBtn').click();
  if (e.key === 'ArrowLeft') document.getElementById('prevBtn').click();
});

renderDay(1);
</script>
